name: CI Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t anchit123/docker-react -f Dockerfile.dev .

    - name: Run tests
      run: docker run -e CI=true anchit123/docker-react npm run test -- --coverage
